<html>

<head>
    <title>LOGIN FORM</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='login.css') }}">
</head>

<body>

    <div class="act">

        <form action="/login" method="POST">

            <h1>LOGIN</h1>

            <div class="input-box">
                <input type="text"
                name="username"
                placeholder="Enter your name"
                required>
            </div>

            <div class="input-box">
                <input type="password"
                name="password"
                placeholder="Enter your password"
                required>
            </div>

            <button type="submit" class="btn">
                Login
            </button>

            <div class="register-link">
                <b><p>
                    Don't have an account?

                   <a href="/register">
                        Register Now
                    </a>
                </p></b>
            </div>

        </form>

    </div>

</body>

</html>
