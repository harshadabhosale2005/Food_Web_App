<html>

<head>
    <title>REGISTER FORM</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='register.css') }}">
</head>

<body>

<div class="action">

<form action="/register" method="POST">

<h1>REGISTER NOW</h1>

<div class="input-box">
<input type="text"
name="username"
placeholder="Enter your name"
required>
</div>

<div class="input-box">
<input type="email"
name="email"
placeholder="Enter your email"
required>
</div>

<div class="input-box">
<input type="password"
name="password"
placeholder="Enter your password"
required>
</div>

<div class="input-box">
<input type="password"
name="confirm_password"
placeholder="Confirm your password"
required>
</div>

<button type="submit" class="btn">
Register
</button>

<div class="register-link">
<p>
Already have an account?
<b><a href="/login">Login Now</a></b>
</p>
</div>

</form>

</div>

</body>

</html>
